spring.application.name=ApiGateway
jwt.secret=Y2Y4ZTM1YmYtYjYyMC00ZDllLTlhZTMtZDY2ZDU4ZTMxZmE5Cg==
jwt.expiration.ms=1800000
server:
  port: 7070

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: FACILITYSERVICE
          uri: lb://FACILITYSERVICE
          predicates:
            - Path=/facilities/**, /staff/**
          filters:
            - JwtAuthFilter

        - id: COMPLIANCESERVICE
          uri: lb://COMPLIANCESERVICE
          predicates:
            - Path=/compliance/**
          filters:
            - JwtAuthFilter

        - id: CITIZENSERVICE
          uri: lb://CITIZENSERVICE
          predicates:
            - Path=/api/citizens/**
          filters:
            - JwtAuthFilter

        - id: AUTHSERVICE
          uri: lb://AUTHSERVICE
          predicates:
            - Path=/auth/**

        - id: EMERGENCYSERVICE
          uri: lb://EMERGENCYSERVICE
          predicates:
            - Path=/emergencies/**
          filters:
            - JwtAuthFilter

        - id: PATIENTTREATMENTSERVICE
          uri: lb://PATIENTTREATMENTSERVICE
          predicates:
            - Path=/patients/**, /treatments/**
          filters:
            - JwtAuthFilter

        # ── NEW: Notification Service ──────────────────────────────────────────
        - id: NOTIFICATIONSERVICE
          uri: lb://NOTIFICATIONSERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - JwtAuthFilter

        # Internal event endpoints — no JWT (service-to-service calls)
        - id: NOTIFICATIONSERVICE-EVENTS
          uri: lb://NOTIFICATIONSERVICE
          predicates:
            - Path=/notifications/events/**

        # ── NEW: Spring AI Service ─────────────────────────────────────────────
        - id: AISERVICE
          uri: lb://AISERVICE
          predicates:
            - Path=/ai/**
          filters:
            - JwtAuthFilter

        # Emergency guidance is open (no JWT required)
        - id: AISERVICE-PUBLIC
          uri: lb://AISERVICE
          predicates:
            - Path=/ai/emergency-guidance, /ai/health

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
