server:
  port: 7070

spring:
  application:
    name: SPRING-BOOT-ADMIN
  config:
    import: optional:configserver:http://localhost:8888

  security:
    user:
      name: admin
      password: admin@123

  boot:
    admin:
      monitor:
        status-interval: 20000
        status-lifetime: 30000
        connect-timeout: 5000
        read-timeout: 5000
      ui:
        title: CityCare Admin Dashboard
        brand: "<img src='assets/img/icon-spring-boot-admin.svg'><span>CityCare Admin</span>"
      # Email notifications when service goes DOWN or UP
      notify:
        mail:
          enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: CityCare Spring Boot Admin
    description: Centralized monitoring dashboard for all CityCare microservices
    version: 1.0.0

logging:
  level:
    de.codecentric.boot.admin: INFO
    org.citycare.adminmonitor: DEBUG
