server:
  port: 8888

spring:
  application:
    name: CONFIG-SERVER
  profiles:
    active: native
  cloud:
    config:
      server:
        # Using native (file-system based) backend for local development
        # In production, you would use git backend instead
        native:
          search-locations: file:///C:/Users/2478356/Downloads/CityCare-Microservices/config-repo
          # Alternative search-locations (uncomment for your environment):
          # - file:${user.home}/config-repo
          # - file:/var/config-repo

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: DEBUG
    org.springframework.boot: INFO

